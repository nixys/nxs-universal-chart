suite: example daemonset
templates:
  - templates/workloads/daemonset.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the DaemonSet example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: universal-blue-node-agent
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.labels.component
          value: node-agent
      - equal:
          path: metadata.labels.gitops-profile
          value: platform
      - equal:
          path: metadata.annotations.note
          value: node-observer
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "5"
      - equal:
          path: spec.selector.matchLabels.component
          value: node-agent
      - equal:
          path: spec.template.metadata.labels["workload-tier"]
          value: backend
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap-shared-config"]
      - notExists:
          path: spec.template.metadata.annotations["checksum/configmap-app-settings"]
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: topology.kubernetes.io/zone
      - equal:
          path: spec.template.spec.containers[0].name
          value: agent
      - equal:
          path: spec.template.spec.containers[0].image
          value: busybox:1.36.1
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9100
