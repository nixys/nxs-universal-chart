suite: rendering contract
templates:
  - templates/misc/configmap.yml
  - templates/networking/networkpolicy.yml
  - templates/networking/svc.yml
  - templates/workloads/daemonset.yml
  - templates/workloads/deployment.yml
  - templates/workloads/pod.yml
  - templates/workloads/statefulset.yml
  - templates/batch/job.yml
  - templates/batch/cronjob.yml
  - templates/observability/hpa.yaml
  - templates/observability/pdb.yaml
  - templates/storage/pv.yml
  - templates/storage/pvc.yml
  - templates/security/secret.yml
  - templates/rbac/serviceaccount.yml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no Deployment documents by default
    template: templates/workloads/deployment.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no DaemonSet documents by default
    template: templates/workloads/daemonset.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no Pod documents by default
    template: templates/workloads/pod.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no Service documents by default
    template: templates/networking/svc.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no NetworkPolicy documents by default
    template: templates/networking/networkpolicy.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no ConfigMap documents by default
    template: templates/misc/configmap.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies generic labels, selector labels, and tpl-based generic values
    values:
      - values/rendering_contract.values.yaml
    template: templates/workloads/deployment.yml
    documentSelector:
      path: metadata.name
      value: platform-api
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: platform
      - equal:
          path: metadata.labels.platform
          value: shared
      - equal:
          path: metadata.labels.component
          value: api
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.note
          value: external
      - equal:
          path: spec.selector.matchLabels.tenant
          value: core
      - equal:
          path: spec.selector.matchLabels.component
          value: api
      - equal:
          path: spec.template.metadata.annotations.environment
          value: prod
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.25.4
      - equal:
          path: spec.template.spec.nodeSelector.nodepool
          value: common
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: prod

  - it: applies shared selector labels to Services
    values:
      - values/rendering_contract.values.yaml
    template: templates/networking/svc.yml
    documentSelector:
      path: metadata.name
      value: platform-api
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.labels["traffic-scope"]
          value: shared
      - equal:
          path: metadata.annotations["service.example.com/managed-by"]
          value: general
      - equal:
          path: spec.selector.tenant
          value: core
      - equal:
          path: spec.selector.component
          value: api

  - it: skips disabled Services and auto-renders the governing StatefulSet Service
    values:
      - values/rendering_contract.values.yaml
    template: templates/networking/svc.yml
    asserts:
      - hasDocuments:
          count: 2

  - it: auto-renders a headless governing Service for StatefulSets without an explicit Service
    values:
      - values/rendering_contract.values.yaml
    template: templates/networking/svc.yml
    documentSelector:
      path: metadata.name
      value: platform-worker
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.labels["traffic-scope"]
          value: shared
      - equal:
          path: metadata.annotations["service.example.com/managed-by"]
          value: general
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
      - equal:
          path: spec.ports[0].targetPort
          value: tcp

  - it: resolves tpl values inside generated ConfigMaps
    values:
      - values/rendering_contract.values.yaml
    template: templates/misc/configmap.yml
    documentSelector:
      path: metadata.name
      value: platform-settings
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.ENVIRONMENT
          value: prod

  - it: renders deterministic unnamed containers and batch-only mode
    values:
      - values/workload_features.values.yaml
    template: templates/batch/job.yml
    documentSelector:
      path: metadata.name
      value: stable-east-migration
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.template.spec.containers[0].name
          value: migration-0

  - it: skips Deployments when workloadMode is batch
    values:
      - values/workload_features.values.yaml
    template: templates/workloads/deployment.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders NetworkPolicies from the dedicated networking template
    values:
      - values/workload_features.values.yaml
    template: templates/networking/networkpolicy.yml
    documentSelector:
      path: metadata.name
      value: stable-east-api
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.policyTypes[0]
          value: Ingress

  - it: applies fullnameOverride and nameSuffix through the shared fullname helper
    values:
      - values/workload_features.values.yaml
    template: templates/networking/networkpolicy.yml
    documentSelector:
      path: metadata.name
      value: stable-east-api
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: stable-east

  - it: injects automatic checksum annotations into Deployment pods
    values:
      - values/rendering_contract.values.yaml
    template: templates/workloads/deployment.yml
    documentSelector:
      path: metadata.name
      value: platform-api
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap-settings"]
      - exists:
          path: spec.template.metadata.annotations["checksum/secret-app"]

  - it: renders StatefulSets with a generated governing Service name and checksum annotations
    values:
      - values/rendering_contract.values.yaml
    template: templates/workloads/statefulset.yml
    documentSelector:
      path: metadata.name
      value: platform-worker
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.serviceName
          value: platform-worker
      - equal:
          path: spec.template.spec.nodeSelector.nodepool
          value: worker
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi
      - notExists:
          path: spec.template.spec.containers[0].resources.requests.cpu
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap-settings"]
      - notExists:
          path: spec.template.metadata.annotations["checksum/secret-app"]

  - it: renders only enabled HPAs with at least one metric
    values:
      - values/rendering_contract.values.yaml
    template: templates/observability/hpa.yaml
    asserts:
      - hasDocuments:
          count: 1

  - it: renders the HPA contract with targetCPU
    values:
      - values/rendering_contract.values.yaml
    template: templates/observability/hpa.yaml
    documentSelector:
      path: metadata.name
      value: platform-api
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 75

  - it: renders the PDB contract
    values:
      - values/rendering_contract.values.yaml
    template: templates/observability/pdb.yaml
    documentSelector:
      path: metadata.name
      value: platform-api
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1

  - it: renders the PVC contract
    values:
      - values/rendering_contract.values.yaml
    template: templates/storage/pvc.yml
    documentSelector:
      path: metadata.name
      value: platform-shared-data
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: 2Gi

  - it: renders the PV contract
    values:
      - values/rendering_contract.values.yaml
    template: templates/storage/pv.yml
    documentSelector:
      path: metadata.name
      value: platform-shared-data
    asserts:
      - isKind:
          of: PersistentVolume
      - equal:
          path: spec.capacity.storage
          value: 2Gi
      - equal:
          path: spec.storageClassName
          value: standard
      - equal:
          path: spec.hostPath.path
          value: /tmp/platform-shared-data

  - it: renders only enabled Secret resources
    values:
      - values/rendering_contract.values.yaml
    template: templates/security/secret.yml
    asserts:
      - hasDocuments:
          count: 1

  - it: renders the Secret contract
    values:
      - values/rendering_contract.values.yaml
    template: templates/security/secret.yml
    documentSelector:
      path: metadata.name
      value: platform-app
    asserts:
      - isKind:
          of: Secret
      - exists:
          path: data.password

  - it: renders ServiceAccount and namespaced RBAC documents
    values:
      - values/rendering_contract.values.yaml
    template: templates/rbac/serviceaccount.yml
    asserts:
      - hasDocuments:
          count: 3

  - it: renders the ServiceAccount contract
    values:
      - values/rendering_contract.values.yaml
    template: templates/rbac/serviceaccount.yml
    documentSelector:
      path: kind
      value: ServiceAccount
    asserts:
      - equal:
          path: metadata.name
          value: platform-deployer

  - it: renders the Role contract
    values:
      - values/rendering_contract.values.yaml
    template: templates/rbac/serviceaccount.yml
    documentSelector:
      path: kind
      value: Role
    asserts:
      - equal:
          path: metadata.name
          value: platform-deployer-role
