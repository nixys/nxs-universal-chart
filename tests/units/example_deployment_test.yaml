suite: example deployment
templates:
  - templates/workloads/deployment.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the Deployment example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: universal-blue-api
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.labels.component
          value: api
      - equal:
          path: metadata.labels.gitops-profile
          value: platform
      - equal:
          path: metadata.annotations["app.example.com/managed-by"]
          value: gitops
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "10"
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-options"]
          value: ServerSideApply=true
      - equal:
          path: metadata.annotations["argocd.argoproj.io/compare-options"]
          value: IgnoreExtraneous
      - equal:
          path: spec.replicas
          value: 2
      - equal:
          path: spec.selector.matchLabels.tenant
          value: shared
      - equal:
          path: spec.selector.matchLabels.component
          value: api
      - equal:
          path: spec.template.metadata.labels["workload-tier"]
          value: backend
      - equal:
          path: spec.template.metadata.annotations["rendered-from"]
          value: values-example
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap-app-settings"]
      - equal:
          path: spec.template.spec.serviceAccountName
          value: universal-blue-deployer
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: topology.kubernetes.io/zone
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry.example.com
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: config-init
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:1.36.1
      - equal:
          path: spec.template.spec.containers[0].name
          value: api
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.27.5
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: APP_FEATURE
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.configMapKeyRef.name
          value: universal-blue-app-settings
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: universal-blue-app-secret
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: universal-blue-envs
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: universal-blue-secret-envs
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: app-settings
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: shared-config
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: universal-blue-app-settings
      - equal:
          path: spec.template.spec.volumes[1].configMap.name
          value: universal-blue-shared-config
      - equal:
          path: spec.template.spec.containers[0].env[2].value
          value: production
