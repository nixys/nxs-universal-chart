suite: service account resolution
templates:
  - templates/workloads/deployment.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: resolves serviceAccountName to the generated ServiceAccount fullname
    values:
      - values/service_account_resolution.values.yaml
    documentSelector:
      path: metadata.name
      value: platform-api
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: platform-deployer
