suite: example rbac
templates:
  - templates/rbac/serviceaccount.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the ServiceAccount example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: kind
      value: ServiceAccount
    asserts:
      - equal:
          path: metadata.name
          value: universal-blue-deployer
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "5"

  - it: renders the Role example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: kind
      value: Role
    asserts:
      - equal:
          path: metadata.name
          value: universal-blue-deployer-role
      - equal:
          path: rules[0].resources[0]
          value: pods
      - equal:
          path: rules[0].resources[1]
          value: configmaps
      - equal:
          path: rules[0].verbs[2]
          value: watch

  - it: renders the RoleBinding example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: kind
      value: RoleBinding
    asserts:
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: universal-blue-deployer-role
      - equal:
          path: subjects[0].name
          value: universal-blue-deployer

  - it: renders the ClusterRoleBinding example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: kind
      value: ClusterRoleBinding
    asserts:
      - equal:
          path: metadata.name
          value: universal-blue-view
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: view
      - equal:
          path: subjects[0].namespace
          value: default
