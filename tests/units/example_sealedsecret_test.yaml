suite: example sealedsecret
templates:
  - templates/security/secret.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the SealedSecret example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: kind
      value: SealedSecret
    asserts:
      - isKind:
          of: SealedSecret
      - equal:
          path: metadata.name
          value: universal-blue-sealed-app
      - equal:
          path: metadata.labels.component
          value: api
      - equal:
          path: spec.encryptedData.password
          value: AgBy7exampleencryptedpayload
      - equal:
          path: spec.template.metadata.name
          value: universal-blue-sealed-app
      - equal:
          path: spec.template.metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "5"
