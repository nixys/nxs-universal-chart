suite: example ingress
templates:
  - templates/networking/ingress.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the ingress example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: universal-blue-app.example.com
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: metadata.labels.component
          value: api
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/ssl-redirect"]
          value: "true"
      - equal:
          path: spec.rules[0].host
          value: app.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: universal-blue-api
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.name
          value: http
      - notExists:
          path: spec.tls
