suite: example pod
templates:
  - templates/workloads/pod.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the Pod example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: universal-blue-toolbox
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.labels.component
          value: toolbox
      - equal:
          path: metadata.labels["workload-tier"]
          value: backend
      - equal:
          path: metadata.annotations.note
          value: interactive-toolbox
      - equal:
          path: metadata.annotations["rendered-from"]
          value: values-example
      - exists:
          path: metadata.annotations["checksum/configmap-shared-config"]
      - notExists:
          path: metadata.annotations["checksum/secret-app-secret"]
      - equal:
          path: spec.restartPolicy
          value: Always
      - equal:
          path: spec.topologySpreadConstraints[0].topologyKey
          value: topology.kubernetes.io/zone
      - equal:
          path: spec.containers[0].name
          value: toolbox
      - equal:
          path: spec.containers[0].image
          value: busybox:1.36.1
      - equal:
          path: spec.containers[0].stdin
          value: true
      - equal:
          path: spec.containers[0].tty
          value: true
      - equal:
          path: spec.containers[0].args[0]
          value: sleep 3600
