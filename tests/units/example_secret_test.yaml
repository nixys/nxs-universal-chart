suite: example secret
templates:
  - templates/security/secret.yml
release:
  name: smoke-test
  namespace: default

tests:
  - it: renders the shared Secret envs example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: universal-blue-secret-envs
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-999"
      - equal:
          path: data.API_TOKEN
          value: dmVyeS1zZWNyZXQtdG9rZW4=

  - it: renders the application Secret example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: universal-blue-app-secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.labels.component
          value: api
      - equal:
          path: data.password
          value: c3VwZXJzZWNyZXQ=

  - it: renders the docker config Secret example
    values:
      - ../../values.yaml.example
    documentSelector:
      path: metadata.name
      value: registry.example.com
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - exists:
          path: data[".dockerconfigjson"]
