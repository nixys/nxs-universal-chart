# -- Override the generated application name used in labels and resource names.
nameOverride: ""

# -- Prefix prepended to rendered resource names. Set `"-"` to drop the release-name prefix entirely.
releasePrefix: ""

# -- Optional Kubernetes version override used by capability helpers.
kubeVersion: ""

# -- Restrict rendered workload controllers: `auto`, `deployment`, `daemonset`, `pod`, `statefulset`, `batch`, `job`, `cronjob`, `hook`, or `none`.
workloadMode: auto

# -- Shared GitOps metadata and controller-specific annotations/labels.
gitops:
  # -- Labels applied to all rendered resources.
  commonLabels: {}
  # -- Annotations applied to all rendered resources.
  commonAnnotations: {}
  argo:
    # -- Enable Argo CD annotations rendering.
    enabled: false
    # -- Optional Argo CD sync wave applied to resources.
    syncWave: null
    # -- Optional Argo CD sync options joined into `argocd.argoproj.io/sync-options`.
    syncOptions: []
    # -- Optional Argo CD compare options joined into `argocd.argoproj.io/compare-options`.
    compareOptions: []
  flux:
    # -- Enable Flux-specific labels and annotations rendering.
    enabled: false
    # -- Optional Flux labels merged into resource metadata when enabled.
    labels: {}
    # -- Optional Flux annotations merged into resource metadata when enabled.
    annotations: {}

# -- Legacy GitOps-safe rendering options kept for backward compatibility. Deterministic naming is enabled by default through `generic.deterministicNames`.
gitOps:
  # -- Use deterministic fallback names for unnamed containers and initContainers.
  safeMode: false

# -- Shared defaults and reusable values for all rendered templates.
generic:
  # -- Labels merged into every resource.
  labels: {}
  # -- Annotations merged into every resource.
  annotations: {}
  # -- Deterministic base name override used by all rendered resources.
  fullnameOverride: ""
  # -- Optional suffix appended to the deterministic base name.
  nameSuffix: ""
  # -- Render deterministic fallback names for unnamed containers and initContainers.
  deterministicNames: true
  # -- Add checksum annotations for ConfigMaps and Secrets referenced by each workload to its pod template.
  autoRolloutChecksums: true
  # -- Extra selector labels merged into selectors and workload pod labels.
  extraSelectorLabels: {}
  # -- Extra labels merged into all workload pods.
  podLabels: {}
  # -- Extra annotations merged into all workload pods.
  podAnnotations: {}
  # -- Optional default URL override exposed through `.Values.generic.defaultURL`.
  defaultURL: ""
  # -- Optional Helm version override used by capability helpers.
  helmVersion: ""
  # -- Optional Kubernetes version override used by capability helpers.
  kubeVersion: ""
  # -- Optional API version overrides used by capability helpers.
  apiVersions: {}
  # -- Additional arbitrary keys under `generic` are available to `tpl` rendering as `.Values.generic.*`.
  # -- Shared typed volumes appended to all workload specs.
  volumes: []
  # -- Shared raw volumes appended to all workload specs.
  extraVolumes: []
  # -- Shared volume mounts appended to all containers.
  volumeMounts: []
  # -- Deprecated alias for `volumeMounts`.
  extraVolumeMounts: []
  # -- Shared imagePullSecrets appended to all workload specs.
  extraImagePullSecrets: []
  # -- Shared pod tolerations.
  tolerations: []
  # -- Shared topologySpreadConstraints applied to all workload pod specs unless overridden per workload.
  topologySpreadConstraints: []
  # -- Shared hostAliases block.
  hostAliases: []
  # -- Shared priorityClassName.
  priorityClassName: ""
  # -- Shared DNS policy.
  dnsPolicy: ""
  # -- Shared serviceAccountName used when workload-level value is omitted.
  serviceAccountName: ""
  # -- Enable generated affinity presets when workload affinity is not specified.
  usePredefinedAffinity: true

# -- Optional dependency overrides and compatibility toggles preserved from previous umbrella-chart releases.
nuc-common:
  enabled: false
nuc-traefik:
  enabled: false
nuc-certificates:
  enabled: false
nuc-istio:
  enabled: false
nuc-knative:
  enabled: false
nuc-kserve:
  enabled: false
nuc-kube-prometheus-stack:
  enabled: false
nuc-native-gateway:
  enabled: false
nuc-victoria-metrics:
  enabled: false
nuc-vault-secret-operator:
  enabled: false
nuc-argocd:
  enabled: false
nuc-fluxcd:
  enabled: false
nuc-keda:
  enabled: false

# -- Pod affinity preset used when generated affinities are enabled.
podAffinityPreset: soft

# -- Pod anti-affinity preset used when generated affinities are enabled.
podAntiAffinityPreset: soft

# -- Node affinity preset used when generated affinities are enabled.
nodeAffinityPreset:
  # -- Node affinity type: `soft` or `hard`.
  type: ""
  # -- Node label key used by generated node affinity.
  key: ""
  # -- Node label values used by generated node affinity.
  values: []

# -- Shared ConfigMap key-value pairs rendered into the generated `envs` ConfigMap.
envs: {}

# -- Raw YAML string merged into the generated `envs` ConfigMap.
envsString: ""

# -- Shared Secret key-value pairs rendered into the generated `secret-envs` Secret.
secretEnvs: {}

# -- Raw YAML string merged into the generated `secret-envs` Secret.
secretEnvsString: ""

# -- Docker config JSON payloads rendered as imagePullSecrets.
imagePullSecrets: {}

# -- Optional diagnostic mode overriding container command and args in all workloads.
diagnosticMode:
  enabled: false
  enbled: false
  command:
    - sleep
  args:
    - infinity

# -- Default container image used when a container omits `image`.
defaultImage: nginx

# -- Default container image tag used when a container omits `imageTag`.
defaultImageTag: latest

# -- Default container image pull policy used when a container omits `imagePullPolicy`.
defaultImagePullPolicy: IfNotPresent

# -- Ingress resources keyed by host or logical name.
ingresses: {}

# -- Service resources keyed by service name.
services: {}

# -- NetworkPolicies keyed by resource suffix.
networkPolicies: {}

# -- Shared defaults applied to Deployment workloads.
deploymentsGeneral: {}

# -- Deployment workloads keyed by resource suffix.
deployments: {}

# -- Shared defaults applied to DaemonSet workloads.
daemonSetsGeneral: {}

# -- DaemonSet workloads keyed by resource suffix.
daemonSets: {}

# -- Shared defaults applied to Pod workloads.
podsGeneral: {}

# -- Pod workloads keyed by resource suffix.
pods: {}

# -- Shared defaults applied to StatefulSet workloads.
statefulSetsGeneral: {}

# -- StatefulSet workloads keyed by resource suffix.
statefulSets: {}

# -- Shared defaults applied to generated ServiceAccounts.
serviceAccountGeneral: {}

# -- ServiceAccount resources keyed by service-account suffix.
serviceAccount: {}

# -- Secret resources keyed by secret suffix.
secrets: {}

# -- SealedSecret resources keyed by secret suffix.
sealedSecrets: {}

# -- ConfigMap resources keyed by configmap suffix.
configMaps: {}

# -- PersistentVolume resources keyed by volume suffix.
pvs: {}

# -- PersistentVolumeClaim resources keyed by claim suffix.
pvcs: {}

# -- Shared defaults applied to hook Jobs.
hooksGeneral: {}

# -- Helm hook Jobs keyed by resource suffix.
hooks: {}

# -- Shared defaults applied to CronJobs.
cronJobsGeneral: {}

# -- CronJobs keyed by resource suffix.
cronJobs: {}

# -- Shared defaults applied to one-shot Jobs.
jobsGeneral: {}

# -- Jobs keyed by resource suffix.
jobs: {}

# -- PodDisruptionBudget resources keyed by resource suffix.
pdbs: {}

# -- HorizontalPodAutoscaler resources keyed by resource suffix.
hpas: {}

# -- Additional raw manifests rendered through `tpl`, keyed by logical name.
extraDeploy: {}
