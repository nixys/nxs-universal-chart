{{- if .Values.serviceAccount -}}
{{- $general := dict -}}
{{- if kindIs "map" $.Values.serviceAccountGeneral -}}
  {{- $general = $.Values.serviceAccountGeneral -}}
{{- end -}}
{{- $serviceAccount := list -}}
{{- if kindIs "string" .Values.serviceAccount -}}
{{- $serviceAccount = fromYaml .Values.serviceAccount -}}
{{- else if kindIs "map" .Values.serviceAccount -}}
{{- $serviceAccount = .Values.serviceAccount -}}
{{- end -}}
{{- range $name, $val := $serviceAccount }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
    {{- include "helpers.app.genericAnnotations" $ | indent 4 }}
    {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}

{{- /* ServiceAccount imagePullSecrets (preferred over pod-level imagePullSecrets) */ -}}
{{- $ipsGeneral := $general.imagePullSecrets | default dict -}}
{{- $ipsLocal := $val.imagePullSecrets | default dict -}}

{{- $includePlatform := false -}}
{{- if and (kindIs "map" $ipsGeneral) (hasKey $ipsGeneral "includePlatformDefault") -}}
  {{- $includePlatform = ($ipsGeneral.includePlatformDefault | default false) -}}
{{- end -}}
{{- if and (kindIs "map" $ipsLocal) (hasKey $ipsLocal "includePlatformDefault") -}}
  {{- $includePlatform = ($ipsLocal.includePlatformDefault | default $includePlatform) -}}
{{- end -}}

{{- $additional := list -}}
{{- $additionalGeneral := list -}}
{{- if kindIs "map" $ipsGeneral -}}
  {{- $additionalGeneral = (default (list) $ipsGeneral.additional) -}}
{{- end -}}
{{- if kindIs "slice" $additionalGeneral -}}
  {{- $additional = $additionalGeneral -}}
{{- end -}}

{{- $additionalLocal := list -}}
{{- if kindIs "map" $ipsLocal -}}
  {{- $additionalLocal = (default (list) $ipsLocal.additional) -}}
{{- else if kindIs "slice" $ipsLocal -}}
  {{- /* Allow serviceAccount.<name>.imagePullSecrets: [{name: ...}] */ -}}
  {{- $additionalLocal = $ipsLocal -}}
{{- end -}}
{{- if kindIs "slice" $additionalLocal -}}
  {{- $additional = concat $additional $additionalLocal -}}
{{- end -}}

{{- $imagePullSecrets := list -}}
{{- $serviceAccountDefault := $.Values.serviceAccountDefaultImagePullSecretName | default "" -}}
{{- if and $includePlatform (ne $serviceAccountDefault "") -}}
  {{- $imagePullSecrets = append $imagePullSecrets (dict "name" $serviceAccountDefault) -}}
{{- end -}}
{{- range $s := $additional -}}
  {{- if kindIs "string" $s -}}
    {{- $imagePullSecrets = append $imagePullSecrets (dict "name" $s) -}}
  {{- else if and (kindIs "map" $s) (hasKey $s "name") -}}
    {{- $imagePullSecrets = append $imagePullSecrets (dict "name" $s.name) -}}
  {{- end -}}
{{- end -}}

{{- if gt (len $imagePullSecrets) 0 }}
imagePullSecrets:
{{- range $s := $imagePullSecrets }}
  - name: {{ include "helpers.tplvalues.render" (dict "value" $s.name "context" $) | quote }}
{{- end }}
{{- end }}

{{- if .roles }}
{{- range $role := .roles }}
{{- if $role.rules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $role.name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
    {{- include "helpers.app.genericAnnotations" $ | indent 4 }}
    {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
rules:
{{ include "helpers.tplvalues.render" ( dict "value" $role.rules "context" $ )}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $role.name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
    {{- include "helpers.app.genericAnnotations" $ | indent 4 }}
    {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "helpers.app.fullname" (dict "name" $role.name "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $role.name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
    {{- include "helpers.app.genericAnnotations" $ | indent 4 }}
    {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if $role.clusterScope }}ClusterRole{{ else }}Role{{ end }}
  name: {{ $role.name }}
subjects:
- kind: ServiceAccount
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- if .clusterRoles }}
{{- range $clusterRole := .clusterRoles }}
{{- if $clusterRole.rules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
