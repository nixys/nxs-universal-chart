nameOverride: cert-manager-app

nuc-certificates:
  enabled: true
  clusterIssuers:
    letsencrypt:
      spec:
        acme:
          email: ops@example.local
          server: https://acme-staging-v02.api.letsencrypt.org/directory
          privateKeySecretRef:
            name: letsencrypt-account-key
          solvers:
            - http01:
                ingress:
                  ingressClassName: nginx
  certificates:
    app-tls:
      namespace: default
      spec:
        secretName: app-tls
        dnsNames:
          - cert-manager-app.example.local
        issuerRef:
          name: letsencrypt
          kind: ClusterIssuer
